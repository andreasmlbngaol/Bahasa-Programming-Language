name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: raven
            release_name: raven-linux
          - os: windows-latest
            artifact_name: raven.exe
            release_name: raven-windows.exe
          - os: macos-latest
            artifact_name: raven
            release_name: raven-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile \
            --name raven \
            --add-data "src:." \
            --additional-hooks-dir . \
            main.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile `
            --name raven `
            --add-data "src;." `
            --additional-hooks-dir . `
            main.py

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p release
          cp dist/${{ matrix.artifact_name }} release/${{ matrix.release_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: release/${{ matrix.release_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Raven ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/raven-linux
            artifacts/raven-windows.exe
            artifacts/raven-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}